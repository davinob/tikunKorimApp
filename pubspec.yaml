name: tikun_korim
description: Tikun Korim - Learn Torah reading with toggleable vowels and cantillation
publish_to: 'none'

version: 1.2.2+10

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_inappwebview: ^6.0.0
  localstorage: ^5.0.0
  path_provider: ^2.1.0
  http: ^1.2.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Generates all the mipmap-{m,h,xh,xxh,xxxh}dpi PNGs and the
  # adaptive-icon XML wiring (mipmap-anydpi-v26/ic_launcher.xml +
  # the foreground/background drawables) from the source images
  # under assets/icon/. Run via:
  #   dart run flutter_launcher_icons
  # after editing the source PNGs.
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  # Single legacy square image for pre-Android-8 launchers (and
  # iOS, which doesn't use adaptive icons).
  image_path: "assets/icon/ic_launcher.png"
  # Adaptive icon (Android 8+): a colour-only background plus the
  # transparent-ground foreground generated by scripts/make_icon.py.
  # WHITE so the brown scroll silhouette sits on the same white
  # circle as the learnTorahApp / learnTanahApp siblings on the
  # launcher (the trio reads as one icon family). The pre-Flutter
  # splash window uses a separate `parchment` colour resource (see
  # android/app/src/main/res/values/colors.xml + values-v31/
  # styles.xml) so the icon white doesn't conflict with the
  # parchment splash.
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/ic_launcher_foreground.png"
  # Required for iOS App Store: ensures no transparency on iOS,
  # which Apple rejects.
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/html/
    - assets/html/css/
    - assets/html/js/
    - assets/html/data/
    - assets/html/fonts/
