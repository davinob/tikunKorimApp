name: tikun_korim
description: Tikun Korim - Learn Torah reading with toggleable vowels and cantillation
publish_to: 'none'

version: 1.1.4+6

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_inappwebview: ^6.0.0
  localstorage: ^5.0.0
  path_provider: ^2.1.0
  http: ^1.2.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Generates all the mipmap-{m,h,xh,xxh,xxxh}dpi PNGs and the
  # adaptive-icon XML wiring (mipmap-anydpi-v26/ic_launcher.xml +
  # the foreground/background drawables) from the source images
  # under assets/icon/. Run via:
  #   dart run flutter_launcher_icons
  # after editing the source PNGs.
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  # Single legacy square image for pre-Android-8 launchers (and
  # iOS, which doesn't use adaptive icons).
  image_path: "assets/icon/ic_launcher.png"
  # Adaptive icon (Android 8+): a colour-only background plus the
  # transparent-ground foreground generated by scripts/make_icon.py.
  # The background colour matches the dark-walnut roller of the
  # legacy icon so the two designs feel like one family across
  # launchers that DO and DON'T support adaptive icons.
  adaptive_icon_background: "#654321"
  adaptive_icon_foreground: "assets/icon/ic_launcher_foreground.png"
  # Required for iOS App Store: ensures no transparency on iOS,
  # which Apple rejects.
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/html/
    - assets/html/css/
    - assets/html/js/
    - assets/html/data/
    - assets/html/fonts/
